name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
      release_name:
        description: "Release name"
        required: false

permissions:
  contents: write

defaults:
  run:
    working-directory: ankiplugin

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          path: ankiplugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run python -m unittest discover -s tests

      - name: Build add-on package
        run: uv run python package_addon.py

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm_remark_generator
          path: ankiplugin/dist/llm_remark_generator.ankiaddon
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.release_name || github.event.inputs.tag || github.ref_name }}
          files: ankiplugin/dist/llm_remark_generator.ankiaddon
